name: Sync archive daily

on:
  # Esecuzione schedulata: ogni giorno alle 07:00 UTC (~09:00 Roma in estate, 08:00 in inverno)
  schedule:
    - cron: '0 7 * * *'
  # Permette anche di lanciarlo a mano dal tab Actions
  workflow_dispatch:

# Permessi per committare archivio.json aggiornato sul repo
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Token con permessi di scrittura
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync archive from Twelve Data
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: |
          python sync_daily.py

      - name: Build snapshot
        run: |
          python build_snapshot.py

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add archivio.json archivio.json.gz snapshot.json
          # Committa solo se ci sono cambiamenti
          if git diff --staged --quiet; then
            echo "Nessun cambiamento — skip commit"
          else
            git commit -m "Auto sync archive · $(date -u +%Y-%m-%d)"
            git push
          fi
